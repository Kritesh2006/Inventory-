<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Techy · Screen Inventory</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon">⚙</span>
        <div>
          <div class="brand-name">Techy</div>
          <div class="brand-sub">Screen Inventory</div>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn btn-outline" id="btn-import" title="Import CSV">
          ↑ Import
        </button>
        <button class="btn btn-outline" id="btn-export" title="Export CSV">
          ↓ Export
        </button>
        <button class="btn btn-primary" id="btn-add">
          + Add Model
        </button>
      </div>
    </div>
  </header>

  <!-- SUMMARY CARDS -->
  <section class="summary-section">
    <div class="summary-grid">
      <div class="summary-card" data-brand-filter="">
        <div class="summary-label">Total Items</div>
        <div class="summary-count" id="summary-total">0</div>
        <div class="summary-low" id="summary-low-total"></div>
      </div>
      <div class="summary-card clickable" data-brand-filter="Apple">
        <div class="summary-label">iPhone</div>
        <div class="summary-count" id="summary-iphone">0</div>
        <div class="summary-low" id="summary-low-iphone"></div>
      </div>
      <div class="summary-card clickable" data-brand-filter="Samsung">
        <div class="summary-label">Samsung</div>
        <div class="summary-count" id="summary-samsung">0</div>
        <div class="summary-low" id="summary-low-samsung"></div>
      </div>
      <div class="summary-card clickable" data-brand-filter="Motorola">
        <div class="summary-label">Motorola</div>
        <div class="summary-count" id="summary-motorola">0</div>
        <div class="summary-low" id="summary-low-motorola"></div>
      </div>
      <div class="summary-card clickable" data-brand-filter="Apple iPad">
        <div class="summary-label">iPad</div>
        <div class="summary-count" id="summary-ipad">0</div>
        <div class="summary-low" id="summary-low-ipad"></div>
      </div>
    </div>
  </section>

  <!-- CONTROLS -->
  <section class="controls-section">
    <div class="controls-inner">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="search-input" class="search-input" placeholder="Search model, brand, type…" autocomplete="off" />
        <button class="search-clear" id="search-clear" title="Clear">✕</button>
      </div>
      <div class="filter-tabs" id="filter-tabs">
        <button class="tab active" data-filter="">All</button>
        <button class="tab" data-filter="Apple">iPhone</button>
        <button class="tab" data-filter="Samsung">Samsung</button>
        <button class="tab" data-filter="Samsung-S">Samsung S</button>
        <button class="tab" data-filter="Samsung-Note">Samsung Note</button>
        <button class="tab" data-filter="Samsung-A">Samsung A</button>
        <button class="tab" data-filter="Motorola">Motorola</button>
        <button class="tab" data-filter="Apple iPad">iPad</button>
        <button class="tab" data-filter="low">⚠ Low Stock</button>
      </div>
    </div>
  </section>

  <!-- TABLE -->
  <main class="main-content">
    <div class="table-wrap">
      <table class="inv-table" id="inv-table">
        <thead>
          <tr>
            <th class="col-brand">Brand</th>
            <th class="col-model">Model</th>
            <th class="col-type">Type</th>
            <th class="col-qty">Qty</th>
            <th class="col-min">Min</th>
            <th class="col-notes">Notes</th>
            <th class="col-updated">Updated</th>
            <th class="col-actions">Actions</th>
          </tr>
        </thead>
        <tbody id="inv-tbody"></tbody>
      </table>
      <div class="empty-state" id="empty-state" style="display:none">
        <div class="empty-icon">📦</div>
        <div class="empty-text">No items found</div>
        <div class="empty-sub">Try a different search or filter</div>
      </div>
    </div>
    <div class="table-footer" id="table-footer"></div>
  </main>

  <!-- MODAL: Add / Edit -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Add New Model</h2>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label>Brand *</label>
            <select id="f-brand">
              <option value="Apple">Apple (iPhone)</option>
              <option value="Samsung">Samsung</option>
              <option value="Motorola">Motorola</option>
              <option value="Apple iPad">Apple (iPad)</option>
            </select>
          </div>
          <div class="form-group" id="fg-sub-samsung" style="display:none">
            <label>Samsung Series</label>
            <select id="f-samsung-series">
              <option value="S">S Series</option>
              <option value="Note">Note Series</option>
              <option value="A">A Series</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Model Name *</label>
            <input type="text" id="f-model" placeholder="e.g. iPhone 15 Pro Max" />
          </div>
          <div class="form-group">
            <label>Part Type *</label>
            <select id="f-type">
              <option value="LCD">LCD</option>
              <option value="Digitizer">Digitizer</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Quantity</label>
            <input type="number" id="f-qty" value="0" min="0" />
          </div>
          <div class="form-group">
            <label>Min Stock Alert</label>
            <input type="number" id="f-min" value="2" min="0" />
          </div>
        </div>
        <div class="form-group">
          <label>Notes</label>
          <input type="text" id="f-notes" placeholder="Optional notes…" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="modal-save">Save Item</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Delete confirm -->
  <div class="modal-overlay" id="delete-overlay" style="display:none">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2 class="modal-title">Delete Item?</h2>
        <button class="modal-close" id="delete-close">✕</button>
      </div>
      <div class="modal-body">
        <p id="delete-msg" style="margin:0; color:var(--text-secondary)"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="delete-cancel">Cancel</button>
        <button class="btn btn-danger" id="delete-confirm">Delete</button>
      </div>
    </div>
  </div>

  <!-- HIDDEN: CSV import input -->
  <input type="file" id="csv-file-input" accept=".csv" style="display:none" />

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
